<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Looker Studio TV Player</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
            opacity: 0; 
            transition: opacity 1.5s ease-in-out; 
            z-index: 1;
        }
        iframe.active { opacity: 1; z-index: 2; }
    </style>
</head>
<body>

    <iframe class="active" src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/qgR"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/p_k9e9e4pand"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/p_4ujyrtkwvd"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/p_zw34eukwvd"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/p_84z5bnlwvd"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/p_jpolznlwvd"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/p_ka316nlwvd"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/p_jajefvkwvd"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/p_o3irwvkwvd"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/p_r6gij8lwvd"></iframe>
    <iframe src="https://lookerstudio.google.com/embed/reporting/cb78fec9-e94a-4eed-bdad-f37e7a31f5f7/page/p_ea89m8lwvd"></iframe>

    <script>
        const iframes = document.querySelectorAll('iframe');
        let currentIndex = 0;
        const intervalTime = 25000; // 25 detik per halaman

        setInterval(() => {
            iframes[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % iframes.length;
            iframes[currentIndex].classList.add('active');
            
            // Refresh data secara halus
            const currentSrc = iframes[currentIndex].src;
            iframes[currentIndex].src = currentSrc;
        }, intervalTime);
    </script>
</body>
</html>
